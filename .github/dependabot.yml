version: 2

# Routine version-update PRs are disabled; keep Dependabot security updates
# enabled in repository settings.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: UTC
    open-pull-requests-limit: 0

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: UTC
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: UTC
    open-pull-requests-limit: 0
