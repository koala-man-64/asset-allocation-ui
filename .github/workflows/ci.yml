name: UI CI
run-name: UI CI / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      contracts_version_override:
        description: Published contracts version to force for this run
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: ui-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: workflow-lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: actionlint
        uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8 # v1.7.11

  build-test:
    name: build-test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout UI repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-ui

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Run env-contract static tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip pytest
          cd asset-allocation-ui
          python -m pytest tests/test_env_contract.py tests/test_multirepo_dependency_contract.py tests/test_workflow_scripts.py -q

      - name: Write required npmrc
        id: npmrc
        env:
          NPMRC_CONTENT: ${{ secrets.NPMRC }}
        shell: bash
        run: |
          set -euo pipefail
          : "${NPMRC_CONTENT:?Set repository secret NPMRC to a complete .npmrc file with read access to @asset-allocation/contracts.}"
          path="${RUNNER_TEMP}/ui.npmrc"
          printf '%s' "${NPMRC_CONTENT}" > "${path}"
          echo "path=${path}" >> "$GITHUB_OUTPUT"

      - name: Resolve contracts package version
        id: contracts
        env:
          CONTRACTS_VERSION_OVERRIDE: ${{ github.event.inputs.contracts_version_override || '' }}
        shell: bash
        run: |
          set -euo pipefail
          versions_path="${RUNNER_TEMP}/contracts-versions.json"
          docker run --rm \
            -v "${{ steps.npmrc.outputs.path }}:/root/.npmrc:ro" \
            node:20-bookworm-slim@sha256:6c51af7dc83f4708aaac35991306bca8f478351cfd2bda35750a62d7efcf05bb \
            bash -lc 'set -euo pipefail; npm view @asset-allocation/contracts versions --json' > "${versions_path}"
          args=(
            --package-json asset-allocation-ui/package.json
            --versions-json "${versions_path}"
          )
          if [ -n "${CONTRACTS_VERSION_OVERRIDE}" ]; then
            args+=(--override "${CONTRACTS_VERSION_OVERRIDE}")
          fi
          python asset-allocation-ui/scripts/workflows/resolve_contracts_version.py "${args[@]}" > "${RUNNER_TEMP}/ui-versions.txt"
          cat "${RUNNER_TEMP}/ui-versions.txt" >> "$GITHUB_OUTPUT"

      - name: Prepare published contracts lockfile
        env:
          CONTRACTS_VERSION: ${{ steps.contracts.outputs.contracts_version }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          package_json_path = Path("asset-allocation-ui/package.json")
          package_json = json.loads(package_json_path.read_text(encoding="utf-8"))
          package_json["dependencies"]["@asset-allocation/contracts"] = os.environ["CONTRACTS_VERSION"]
          package_json_path.write_text(json.dumps(package_json, indent=2) + "\n", encoding="utf-8")
          PY
          docker run --rm \
            -v "${{ github.workspace }}/asset-allocation-ui:/workspace" \
            -v "${{ steps.npmrc.outputs.path }}:/root/.npmrc:ro" \
            -w /workspace \
            node:20-bookworm-slim@sha256:6c51af7dc83f4708aaac35991306bca8f478351cfd2bda35750a62d7efcf05bb \
            bash -lc 'set -euo pipefail; corepack enable; pnpm install --lockfile-only --no-frozen-lockfile'

      - name: Lint, test, and build UI
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -e VITE_PORT="5174" \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ steps.npmrc.outputs.path }}:/root/.npmrc:ro" \
            -w /workspace/asset-allocation-ui \
            node:20-bookworm-slim@sha256:6c51af7dc83f4708aaac35991306bca8f478351cfd2bda35750a62d7efcf05bb \
            bash -lc 'set -euo pipefail; corepack enable; pnpm install --frozen-lockfile; pnpm lint; pnpm exec tsc --noEmit; pnpm vitest run src/app/__tests__/App.auth.test.tsx src/contexts/__tests__/AuthContext.test.tsx src/services/__tests__/apiService.test.ts src/hooks/useRealtime.test.tsx; pnpm build'
