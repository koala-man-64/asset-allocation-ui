name: UI CI
run-name: UI CI / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ui-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: workflow-lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

      - name: Validate pinned image digests
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflows/validate_pinned_image_digests.py

  python-test:
    name: python-test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout UI repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-ui

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Run Python quality checks
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip pytest ruff
          cd asset-allocation-ui
          python -m pytest tests -q

  validate:
    name: validate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout UI repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-ui

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Write required npmrc
        id: npmrc
        env:
          NPMRC_CONTENT: ${{ secrets.NPMRC }}
        shell: bash
        run: |
          set -euo pipefail
          : "${NPMRC_CONTENT:?Set repository secret NPMRC to a complete .npmrc file with read access to @asset-allocation/contracts.}"
          path="${RUNNER_TEMP}/ui.npmrc"
          printf '%s' "${NPMRC_CONTENT}" > "${path}"
          echo "path=${path}" >> "$GITHUB_OUTPUT"

      - name: Validate UI workspace
        shell: bash
        env:
          NPM_CONFIG_USERCONFIG: ${{ steps.npmrc.outputs.path }}
        run: |
          set -euo pipefail
          cd asset-allocation-ui
          corepack enable
          pnpm install --frozen-lockfile
          pnpm format:check
          pnpm lint
          pnpm exec tsc --noEmit
          pnpm vitest run
          pnpm build

  browser-smoke:
    name: browser-smoke
    runs-on: ubuntu-22.04
    needs:
      - validate
    env:
      VITE_UI_AUTH_ENABLED: 'false'
    steps:
      - name: Checkout UI repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-ui

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Write required npmrc
        id: npmrc
        env:
          NPMRC_CONTENT: ${{ secrets.NPMRC }}
        shell: bash
        run: |
          set -euo pipefail
          : "${NPMRC_CONTENT:?Set repository secret NPMRC to a complete .npmrc file with read access to @asset-allocation/contracts.}"
          path="${RUNNER_TEMP}/ui.npmrc"
          printf '%s' "${NPMRC_CONTENT}" > "${path}"
          echo "path=${path}" >> "$GITHUB_OUTPUT"

      - name: Install workspace dependencies
        shell: bash
        env:
          NPM_CONFIG_USERCONFIG: ${{ steps.npmrc.outputs.path }}
        run: |
          set -euo pipefail
          cd asset-allocation-ui
          corepack enable
          pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        shell: bash
        env:
          NPM_CONFIG_USERCONFIG: ${{ steps.npmrc.outputs.path }}
        run: |
          set -euo pipefail
          cd asset-allocation-ui
          pnpm exec playwright install --with-deps chromium

      - name: Build and run browser smoke
        shell: bash
        env:
          NPM_CONFIG_USERCONFIG: ${{ steps.npmrc.outputs.path }}
        run: |
          set -euo pipefail
          cd asset-allocation-ui
          pnpm build
          pnpm test:e2e
