name: UI Release
run-name: UI Release / ${{ github.event_name }} / ${{ github.event.workflow_run.head_branch || github.ref_name }}

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - UI CI
    types:
      - completed

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: ui-release-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-22.04
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      RUNTIME_COMMON_VERSION: "3.5.7"
    steps:
      - name: Validate manual dispatch release ref
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "release.yml must be run from main because production releases are cut from main only." >&2
            exit 1
          fi
          gh api \
            --method GET \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?branch=main&event=push&per_page=100" > workflow-runs.json
          ci_run_id="$(jq -r --arg sha "${RELEASE_SHA}" '.workflow_runs[] | select(.head_sha == $sha and .head_branch == "main" and .conclusion == "success") | .id' workflow-runs.json | head -n 1)"
          : "${ci_run_id:?release.yml manual dispatch requires a successful UI CI push run on main for the selected commit.}"

      - name: Checkout UI repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-ui
          ref: ${{ env.RELEASE_SHA }}

      - name: Resolve package versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          package = json.loads(Path("asset-allocation-ui/package.json").read_text(encoding="utf-8"))
          contracts = package["dependencies"]["@asset-allocation/contracts"]
          with Path("ui-versions.txt").open("w", encoding="utf-8") as handle:
              handle.write(f"contracts_version={contracts}\n")
              handle.write(f"runtime_common_version={os.environ['RUNTIME_COMMON_VERSION']}\n")
              handle.write(f"ui_version={package['version']}\n")
          PY
          cat ui-versions.txt >> "$GITHUB_OUTPUT"

      - name: Write required npmrc
        id: npmrc
        env:
          NPMRC_CONTENT: ${{ secrets.NPMRC }}
        shell: bash
        run: |
          set -euo pipefail
          : "${NPMRC_CONTENT:?Set repository secret NPMRC to a complete .npmrc file with read access to @asset-allocation/contracts.}"
          path="${RUNNER_TEMP}/ui.npmrc"
          printf '%s' "${NPMRC_CONTENT}" > "${path}"
          echo "path=${path}" >> "$GITHUB_OUTPUT"

      - name: Validate required repo deploy vars
        env:
          REPO_VARS_JSON: ${{ toJson(vars) }}
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-ui
          python scripts/validate_github_deploy_vars.py \
            --repo "${GITHUB_REPOSITORY}" \
            --mode prod-runtime \
            --vars-json "${REPO_VARS_JSON}"

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        shell: bash
        run: |
          set -euo pipefail
          az acr login --name "${{ vars.ACR_NAME }}"

      - name: Build and push UI image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          registry="$(az acr show --name "${{ vars.ACR_NAME }}" --resource-group "${{ vars.RESOURCE_GROUP }}" --query loginServer -o tsv)"
          image_ref="${registry}/asset-allocation-ui:${RELEASE_SHA}"
          DOCKER_BUILDKIT=1 docker build --pull \
            --file asset-allocation-ui/Dockerfile \
            --tag "${image_ref}" \
            --secret "id=npmrc,src=${{ steps.npmrc.outputs.path }}" \
            .
          docker push "${image_ref}"
          image_digest="$(docker inspect --format='{{index .RepoDigests 0}}' "${image_ref}")"
          created_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "image_digest=${image_digest}" >> "$GITHUB_OUTPUT"
          echo "created_at=${created_at}" >> "$GITHUB_OUTPUT"

      - name: Write release manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          package = json.loads(Path("asset-allocation-ui/package.json").read_text(encoding="utf-8"))
          manifest = {
              "repo": os.environ["GITHUB_REPOSITORY"],
              "git_sha": os.environ["RELEASE_SHA"],
              "artifact_kind": "container-image",
              "artifact_ref": os.environ["IMAGE_REF"],
              "image_digest": os.environ["IMAGE_DIGEST"],
              "release_run_id": os.environ["GITHUB_RUN_ID"],
              "release_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "created_at": os.environ["CREATED_AT"],
              "version_matrix": {
                  "contracts": package["dependencies"]["@asset-allocation/contracts"],
                  "runtime_common": os.environ["RUNTIME_COMMON_VERSION"],
                  "control_plane": None,
                  "jobs": None,
                  "ui": package["version"],
              },
          }
          Path("artifacts/release-manifest.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}
          CREATED_AT: ${{ steps.image.outputs.created_at }}
          RELEASE_SHA: ${{ env.RELEASE_SHA }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ui-release
          path: artifacts/release-manifest.json
          if-no-files-found: error
          retention-days: 30

      - name: Write release summary
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}
        shell: bash
        run: |
          {
            echo "## UI release"
            echo ""
            echo "- Image: \`${IMAGE_DIGEST}\`"
            echo "- Contracts: \`${{ steps.versions.outputs.contracts_version }}\`"
            echo "- Runtime common: \`${{ steps.versions.outputs.runtime_common_version }}\`"
            echo "- Manifest: \`artifacts/release-manifest.json\`"
          } >> "${GITHUB_STEP_SUMMARY}"
