name: UI Release
run-name: UI Release / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ui-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout UI repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-ui

      - name: Checkout contracts repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ vars.CONTRACTS_REPOSITORY || format('{0}/asset-allocation-contracts', github.repository_owner) }}
          ref: ${{ vars.CONTRACTS_REF || 'main' }}
          path: asset-allocation-contracts

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        shell: bash
        run: |
          set -euo pipefail
          az acr login --name "${{ vars.ACR_NAME }}"

      - name: Build and push UI image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          registry="$(az acr show --name "${{ vars.ACR_NAME }}" --resource-group "${{ vars.RESOURCE_GROUP }}" --query loginServer -o tsv)"
          image_ref="${registry}/asset-allocation-ui:${GITHUB_SHA}"
          docker build --file asset-allocation-ui/Dockerfile --tag "${image_ref}" .
          docker push "${image_ref}"
          image_digest="$(docker inspect --format='{{index .RepoDigests 0}}' "${image_ref}")"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "image_digest=${image_digest}" >> "$GITHUB_OUTPUT"

      - name: Write release manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python - <<'PY'
          import json
          import subprocess
          import tomllib
          import os
          from pathlib import Path

          contracts = tomllib.loads(Path("asset-allocation-contracts/python/pyproject.toml").read_text(encoding="utf-8"))
          contracts_sha = subprocess.check_output(
              ["git", "-C", "asset-allocation-contracts", "rev-parse", "HEAD"],
              text=True,
          ).strip()
          manifest = {
              "repo": os.environ["GITHUB_REPOSITORY"],
              "git_sha": os.environ["GITHUB_SHA"],
              "artifact_kind": "container-image",
              "artifact_ref": os.environ["IMAGE_REF"],
              "image_digest": os.environ["IMAGE_DIGEST"],
              "contracts_version": contracts["project"]["version"],
              "contracts_sha": contracts_sha,
          }
          Path("artifacts/release-manifest.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ui-release
          path: artifacts/release-manifest.json
          if-no-files-found: error
          retention-days: 30

      - name: Write release summary
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}
        shell: bash
        run: |
          {
            echo "## UI release"
            echo ""
            echo "- Image: \`${IMAGE_DIGEST}\`"
            echo "- Manifest: \`artifacts/release-manifest.json\`"
          } >> "${GITHUB_STEP_SUMMARY}"
