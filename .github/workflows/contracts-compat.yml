name: UI Contracts Compatibility
run-name: UI Contracts Compat / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      contracts_ref:
        description: Contracts ref or SHA to validate
        required: false
        default: main
        type: string
  repository_dispatch:
    types:
      - contracts_released

permissions:
  contents: write

concurrency:
  group: ui-contracts-compat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts-compat:
    name: contracts-compat
    runs-on: ubuntu-22.04
    env:
      DISPATCH_CONTRACTS_SHA: ${{ github.event.client_payload.contracts_sha }}
      DISPATCH_CONTRACTS_REF: ${{ github.event.client_payload.contracts_ref }}
      DISPATCH_CONTRACTS_VERSION: ${{ github.event.client_payload.contracts_version }}
    steps:
      - name: Resolve contracts ref
        id: contracts
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ inputs.contracts_ref }}"
          ui_ref="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "repository_dispatch" ]; then
            ref="${DISPATCH_CONTRACTS_SHA:-${DISPATCH_CONTRACTS_REF}}"
            ui_ref="${{ github.event.repository.default_branch }}"
          fi
          ref="${ref:-main}"
          {
            echo "ref=${ref}"
            echo "ui_ref=${ui_ref}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout UI repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-ui
          ref: ${{ steps.contracts.outputs.ui_ref }}
          fetch-depth: 0

      - name: Checkout contracts repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ vars.CONTRACTS_REPOSITORY || format('{0}/asset-allocation-contracts', github.repository_owner) }}
          ref: ${{ steps.contracts.outputs.ref }}
          path: asset-allocation-contracts

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Write required npmrc
        id: npmrc
        env:
          NPMRC_CONTENT: ${{ secrets.NPMRC }}
        shell: bash
        run: |
          set -euo pipefail
          : "${NPMRC_CONTENT:?Set repository secret NPMRC to a complete .npmrc file with read access to @asset-allocation/contracts.}"
          path="${RUNNER_TEMP}/ui.npmrc"
          printf '%s' "${NPMRC_CONTENT}" > "${path}"
          echo "path=${path}" >> "$GITHUB_OUTPUT"

      - name: Pin released contracts version
        if: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.contracts_version != '' }}
        env:
          CONTRACTS_VERSION: ${{ github.event.client_payload.contracts_version }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          package_json_path = Path("asset-allocation-ui/package.json")
          package_json = json.loads(package_json_path.read_text(encoding="utf-8"))
          package_json["dependencies"]["@asset-allocation/contracts"] = os.environ["CONTRACTS_VERSION"]
          package_json_path.write_text(json.dumps(package_json, indent=2) + "\n", encoding="utf-8")
          PY
          docker run --rm \
            -v "${{ github.workspace }}/asset-allocation-ui:/workspace" \
            -v "${{ steps.npmrc.outputs.path }}:/root/.npmrc:ro" \
            -w /workspace \
            node:20-bookworm-slim@sha256:6c51af7dc83f4708aaac35991306bca8f478351cfd2bda35750a62d7efcf05bb \
            bash -lc 'set -euo pipefail; corepack enable; pnpm install --lockfile-only --no-frozen-lockfile'
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pytest asset-allocation-ui/tests/test_multirepo_dependency_contract.py -q

      - name: Run compatibility suite
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -e VITE_PORT="5174" \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ steps.npmrc.outputs.path }}:/root/.npmrc:ro" \
            -w /workspace \
            node:20-bookworm-slim@sha256:6c51af7dc83f4708aaac35991306bca8f478351cfd2bda35750a62d7efcf05bb \
            bash -lc '
              set -euo pipefail
              corepack enable
              cd /workspace/asset-allocation-contracts/ts
              pnpm install --frozen-lockfile
              cd /workspace/asset-allocation-ui
              pnpm install --frozen-lockfile
              compat_dir=/tmp/asset-allocation-ui-compat
              rm -rf "${compat_dir}"
              mkdir -p "${compat_dir}"
              tar -C /workspace/asset-allocation-ui --exclude=.git --exclude=node_modules -cf - . | tar -C "${compat_dir}" -xf -
              node --input-type=module -e "import { readFileSync, writeFileSync } from 'node:fs'; const packageJsonPath = '${compat_dir}/package.json'; const packageJson = JSON.parse(readFileSync(packageJsonPath, 'utf8')); packageJson.dependencies['@asset-allocation/contracts'] = 'file:/workspace/asset-allocation-contracts/ts'; writeFileSync(packageJsonPath, JSON.stringify(packageJson, null, 2) + '\n');"
              cd "${compat_dir}"
              pnpm install --no-frozen-lockfile
              pnpm exec tsc --noEmit
              pnpm vitest run src/app/__tests__/App.auth.test.tsx src/contexts/__tests__/AuthContext.test.tsx src/services/__tests__/apiService.test.ts src/hooks/useRealtime.test.tsx
              pnpm build
            '

      - name: Commit pinned contracts version
        if: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.contracts_version != '' }}
        env:
          CONTRACTS_VERSION: ${{ github.event.client_payload.contracts_version }}
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-ui
          if git diff --quiet -- package.json pnpm-lock.yaml; then
            echo "Contracts version already pinned to ${CONTRACTS_VERSION}."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml
          git commit -m "chore: adopt contracts ${CONTRACTS_VERSION}"
          git push origin HEAD:${{ steps.contracts.outputs.ui_ref }}

      - name: Write compatibility summary
        shell: bash
        run: |
          {
            echo "## UI contracts compatibility"
            echo ""
            echo "- Contracts ref: \`${{ steps.contracts.outputs.ref }}\`"
            echo "- Result: passed"
          } >> "${GITHUB_STEP_SUMMARY}"
