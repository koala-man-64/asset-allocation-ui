name: UI Deploy Runtime

on:
  workflow_call:
    inputs:
      image_digest:
        description: Full container image reference with digest
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy-prod:
    name: deploy-prod
    runs-on: ubuntu-22.04
    environment:
      name: prod
    env:
      API_UPSTREAM: ${{ vars.API_UPSTREAM }}
      API_UPSTREAM_SCHEME: ${{ vars.API_UPSTREAM_SCHEME || 'https' }}
      UI_AUTH_ENABLED: ${{ vars.UI_AUTH_ENABLED || 'true' }}
      UI_AUTH_PROVIDER: ${{ vars.UI_AUTH_PROVIDER || 'password' }}
      UI_ALLOWED_INGRESS_CIDRS: ${{ vars.UI_ALLOWED_INGRESS_CIDRS }}
      UI_OIDC_AUTHORITY: ${{ vars.UI_OIDC_AUTHORITY }}
      UI_OIDC_CLIENT_ID: ${{ vars.UI_OIDC_CLIENT_ID }}
      UI_OIDC_SCOPES: ${{ vars.UI_OIDC_SCOPES }}
      UI_OIDC_AUDIENCE: ${{ vars.UI_OIDC_AUDIENCE }}
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      ACR_NAME: ${{ vars.ACR_NAME }}
      ACR_PULL_IDENTITY_NAME: ${{ vars.ACR_PULL_IDENTITY_NAME || 'asset-allocation-acr-pull-mi' }}
      CONTAINER_APPS_ENVIRONMENT_NAME: ${{ vars.CONTAINER_APPS_ENVIRONMENT_NAME || 'asset-allocation-env' }}
      SERVICE_ACCOUNT_NAME: ${{ vars.SERVICE_ACCOUNT_NAME || 'asset-allocation-sa' }}
      UI_APP_NAME: ${{ vars.UI_APP_NAME || 'asset-allocation-ui' }}
      UI_PUBLIC_HOSTNAME: ${{ vars.UI_PUBLIC_HOSTNAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve rollout inputs
        id: rollout
        shell: bash
        run: |
          set -euo pipefail
          image_digest="${{ inputs.image_digest }}"
          api_upstream="${API_UPSTREAM}"
          api_upstream_scheme="$(printf '%s' "${API_UPSTREAM_SCHEME}" | tr '[:upper:]' '[:lower:]')"
          ui_auth_enabled="$(printf '%s' "${UI_AUTH_ENABLED}" | tr '[:upper:]' '[:lower:]')"
          ui_auth_provider="$(printf '%s' "${UI_AUTH_PROVIDER}" | tr '[:upper:]' '[:lower:]')"
          ui_allowed_ingress_cidrs="${UI_ALLOWED_INGRESS_CIDRS}"
          : "${image_digest:?image_digest is required}"
          : "${api_upstream:?vars.API_UPSTREAM is required}"
          : "${ui_allowed_ingress_cidrs:?vars.UI_ALLOWED_INGRESS_CIDRS is required}"
          case "${api_upstream_scheme}" in
            http|https) ;;
            *)
              echo "vars.API_UPSTREAM_SCHEME must resolve to http or https (received: ${api_upstream_scheme})." >&2
              exit 1
              ;;
          esac
          case "${ui_auth_provider}" in
            disabled|password|oidc) ;;
            *)
              echo "vars.UI_AUTH_PROVIDER must be disabled, password, or oidc (received: ${ui_auth_provider})." >&2
              exit 1
              ;;
          esac
          case "${ui_auth_enabled}" in
            1|true|yes|y|on|t)
              if [ "${ui_auth_provider}" = "oidc" ]; then
                : "${UI_OIDC_AUTHORITY:?vars.UI_OIDC_AUTHORITY is required when UI_AUTH_PROVIDER=oidc}"
                : "${UI_OIDC_CLIENT_ID:?vars.UI_OIDC_CLIENT_ID is required when UI_AUTH_PROVIDER=oidc}"
                : "${UI_OIDC_SCOPES:?vars.UI_OIDC_SCOPES is required when UI_AUTH_PROVIDER=oidc}"
              fi
              ;;
          esac
          python scripts/validate_github_deploy_vars.py \
            --mode prod-runtime \
            --vars-json '${{ toJson(vars) }}'
          {
            echo "image_digest=${image_digest}"
            echo "api_upstream=${api_upstream}"
            echo "api_upstream_scheme=${api_upstream_scheme}"
            echo "ui_auth_provider=${ui_auth_provider}"
          } >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Azure resource identifiers
        id: azure
        shell: bash
        run: |
          set -euo pipefail
          az config set extension.use_dynamic_install=yes_without_prompt > /dev/null
          identity_id="$(az identity show --name "${ACR_PULL_IDENTITY_NAME}" --resource-group "${RESOURCE_GROUP}" --query id -o tsv)"
          acr_login_server="$(az acr show --name "${ACR_NAME}" --resource-group "${RESOURCE_GROUP}" --query loginServer -o tsv)"
          env_id="/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RESOURCE_GROUP}/providers/Microsoft.App/managedEnvironments/${CONTAINER_APPS_ENVIRONMENT_NAME}"
          previous_image="$(az containerapp show --name "${UI_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --query 'properties.template.containers[0].image' -o tsv 2>/dev/null || true)"
          {
            echo "identity_id=${identity_id}"
            echo "acr_login_server=${acr_login_server}"
            echo "environment_id=${env_id}"
            echo "previous_image=${previous_image}"
          } >> "$GITHUB_OUTPUT"

      - name: Render UI manifest
        env:
          UI_IMAGE: ${{ steps.rollout.outputs.image_digest }}
          API_UPSTREAM: ${{ steps.rollout.outputs.api_upstream }}
          API_UPSTREAM_SCHEME: ${{ steps.rollout.outputs.api_upstream_scheme }}
          UI_AUTH_ENABLED: ${{ env.UI_AUTH_ENABLED }}
          UI_AUTH_PROVIDER: ${{ env.UI_AUTH_PROVIDER }}
          UI_ALLOWED_INGRESS_CIDRS: ${{ env.UI_ALLOWED_INGRESS_CIDRS }}
          UI_OIDC_AUTHORITY: ${{ env.UI_OIDC_AUTHORITY }}
          UI_OIDC_CLIENT_ID: ${{ env.UI_OIDC_CLIENT_ID }}
          UI_OIDC_SCOPES: ${{ env.UI_OIDC_SCOPES }}
          UI_OIDC_AUDIENCE: ${{ env.UI_OIDC_AUDIENCE }}
          ACR_LOGIN_SERVER: ${{ steps.azure.outputs.acr_login_server }}
          ACR_PULL_IDENTITY_RESOURCE_ID: ${{ steps.azure.outputs.identity_id }}
          CONTAINER_APPS_ENVIRONMENT_ID: ${{ steps.azure.outputs.environment_id }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from ipaddress import ip_network
          from pathlib import Path
          import os

          template = Path("deploy/app_ui.yaml").read_text(encoding="utf-8")
          for key, value in os.environ.items():
              template = template.replace("${" + key + "}", value)

          raw_cidrs = os.environ["UI_ALLOWED_INGRESS_CIDRS"]
          cidrs = []
          for chunk in raw_cidrs.replace("\n", ",").split(","):
              candidate = chunk.strip()
              if not candidate:
                  continue
              ip_network(candidate, strict=False)
              cidrs.append(candidate)
          if not cidrs:
              raise SystemExit("UI_ALLOWED_INGRESS_CIDRS must include at least one valid CIDR.")

          restriction_lines = []
          for index, cidr in enumerate(cidrs, start=1):
              restriction_lines.extend(
                  [
                      f"        - name: allow-{index:03d}",
                      f"          description: Trusted UI ingress {index}",
                      f'          ipAddressRange: "{cidr}"',
                      "          action: Allow",
                  ]
              )
          template = template.replace(
              "__UI_IP_SECURITY_RESTRICTIONS__",
              "\n".join(restriction_lines),
          )
          Path("rendered-app_ui.yaml").write_text(template, encoding="utf-8")
          PY

      - name: Apply UI manifest
        shell: bash
        run: |
          set -euo pipefail
          if az containerapp show --name "${UI_APP_NAME}" --resource-group "${RESOURCE_GROUP}" > /dev/null 2>&1; then
            az containerapp update --name "${UI_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --yaml rendered-app_ui.yaml
          else
            az containerapp create --name "${UI_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --yaml rendered-app_ui.yaml
          fi

      - name: Verify deployed UI endpoints
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          expect_one_of() {
            local method="$1"
            local url="$2"
            shift 2
            local status
            local body_file
            local curl_exit=0
            local attempt=1
            local max_attempts=18
            local sleep_seconds=10
            body_file="$(mktemp)"
            while [ "${attempt}" -le "${max_attempts}" ]; do
              status=''
              curl_exit=0
              if ! status="$(curl --silent --show-error --retry 12 --retry-delay 10 --retry-connrefused --output "${body_file}" --write-out '%{http_code}' --request "${method}" "${url}")"; then
                curl_exit=$?
              else
                for allowed in "$@"; do
                  if [ "${status}" = "${allowed}" ]; then
                    rm -f "${body_file}"
                    return 0
                  fi
                done
              fi

              if [ "${attempt}" -lt "${max_attempts}" ]; then
                if [ "${curl_exit}" -eq 0 ]; then
                  echo "Attempt ${attempt}/${max_attempts}: ${method} ${url} returned HTTP ${status}. Waiting ${sleep_seconds}s for ACA rollout stabilization."
                else
                  echo "Attempt ${attempt}/${max_attempts}: ${method} ${url} failed with curl exit ${curl_exit}. Waiting ${sleep_seconds}s for ACA rollout stabilization."
                fi
                sleep "${sleep_seconds}"
              fi

              attempt=$((attempt + 1))
            done

            if [ "${curl_exit}" -ne 0 ]; then
              echo "curl exited with status ${curl_exit} for ${method} ${url} after ${max_attempts} attempts." >&2
              rm -f "${body_file}"
              exit "${curl_exit}"
            fi

            echo "Unexpected HTTP status ${status} for ${method} ${url}. Allowed: $*" >&2
            cat "${body_file}" >&2 || true
            rm -f "${body_file}"
            exit 1
          }

          fqdn="$(az containerapp show --name "${UI_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --query 'properties.configuration.ingress.fqdn' -o tsv)"
          actual_image="$(az containerapp show --name "${UI_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --query 'properties.template.containers[0].image' -o tsv)"
          test "${actual_image}" = "${{ steps.rollout.outputs.image_digest }}"
          expect_one_of GET "https://${fqdn}/" 200
          expect_one_of GET "https://${fqdn}/ui-config.js" 200
          python scripts/validate_deployed_ui_oidc.py \
            --ui-origin "https://${fqdn}" \
            --ui-auth-enabled "${UI_AUTH_ENABLED}" \
            --ui-auth-provider "${UI_AUTH_PROVIDER}"
          expect_one_of GET "https://${fqdn}/api/system/status-view" 200 401 403 405
          expect_one_of POST "https://${fqdn}/api/realtime/ticket" 200 401 403 405
          echo "fqdn=${fqdn}" >> "$GITHUB_OUTPUT"

      - name: Bind stable UI custom domain
        id: custom-domain
        if: env.UI_PUBLIC_HOSTNAME != ''
        shell: bash
        run: |
          set -euo pipefail
          fqdn="${{ steps.verify.outputs.fqdn }}"
          verification_id="$(az containerapp show --name "${UI_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --query 'properties.customDomainVerificationId' -o tsv)"

          echo "Preparing custom-domain bind for ${UI_PUBLIC_HOSTNAME}"
          echo "Expected DNS records:"
          echo "  CNAME ${UI_PUBLIC_HOSTNAME} -> ${fqdn}"
          echo "  TXT verification value -> ${verification_id}"

          az containerapp hostname add \
            --name "${UI_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --hostname "${UI_PUBLIC_HOSTNAME}" \
            --only-show-errors >/dev/null 2>&1 || echo "Hostname add skipped; the hostname may already be present."

          az containerapp hostname bind \
            --name "${UI_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --hostname "${UI_PUBLIC_HOSTNAME}" \
            --environment "${CONTAINER_APPS_ENVIRONMENT_NAME}" \
            --validation-method CNAME \
            --only-show-errors

          curl --fail --retry 18 --retry-delay 10 --retry-connrefused "https://${UI_PUBLIC_HOSTNAME}/" > /dev/null
          curl --fail --retry 18 --retry-delay 10 --retry-connrefused "https://${UI_PUBLIC_HOSTNAME}/ui-config.js" > /dev/null
          python scripts/validate_deployed_ui_oidc.py \
            --ui-origin "https://${UI_PUBLIC_HOSTNAME}" \
            --ui-auth-enabled "${UI_AUTH_ENABLED}" \
            --ui-auth-provider "${UI_AUTH_PROVIDER}"

          {
            echo "bound_hostname=${UI_PUBLIC_HOSTNAME}"
            echo "cname_target=${fqdn}"
            echo "verification_id=${verification_id}"
          } >> "$GITHUB_OUTPUT"

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## UI deploy"
            echo ""
            echo "- Target app: \`${UI_APP_NAME}\`"
            echo "- Image: \`${{ steps.rollout.outputs.image_digest }}\`"
            echo "- API upstream scheme: \`${{ steps.rollout.outputs.api_upstream_scheme }}\`"
            echo "- API upstream: \`${{ steps.rollout.outputs.api_upstream }}\`"
            echo "- UI auth enabled: \`${UI_AUTH_ENABLED}\`"
            echo "- UI auth provider: \`${UI_AUTH_PROVIDER}\`"
            echo "- UI bootstrap: \`/ui-config.js\`"
            echo "- Ingress CIDRs: \`${UI_ALLOWED_INGRESS_CIDRS}\`"
            echo "- FQDN: https://${{ steps.verify.outputs.fqdn }}"
            if [ -n "${{ steps.custom-domain.outputs.bound_hostname }}" ]; then
              echo "- Stable hostname: https://${{ steps.custom-domain.outputs.bound_hostname }}"
              echo "- CNAME target: \`${{ steps.custom-domain.outputs.cname_target }}\`"
            fi
            echo "- Previous image: \`${{ steps.azure.outputs.previous_image || 'none' }}\`"
            echo "- Rollback: run \`rollback-prod.yml\` with the previous image digest"
          } >> "${GITHUB_STEP_SUMMARY}"
