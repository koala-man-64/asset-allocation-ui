name: UI Deploy Prod
run-name: UI Deploy Prod / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      image_digest:
        description: Full container image reference with digest
        required: true
        type: string
      api_upstream:
        description: Reachable control-plane host or host:port for /config.js and /api/*
        required: true
        type: string
      contracts_version:
        description: Optional contracts version for the rollout summary
        required: false
        type: string
  repository_dispatch:
    types:
      - deploy_runtime

permissions:
  contents: read
  id-token: write

concurrency:
  group: ui-prod
  cancel-in-progress: false

jobs:
  deploy-prod:
    name: deploy-prod
    runs-on: ubuntu-22.04
    environment:
      name: prod
    env:
      DISPATCH_IMAGE_DIGEST: ${{ github.event.client_payload.image_digest }}
      DISPATCH_API_UPSTREAM: ${{ github.event.client_payload.api_upstream }}
      DISPATCH_CONTRACTS_VERSION: ${{ github.event.client_payload.contracts_version }}
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      ACR_NAME: ${{ vars.ACR_NAME }}
      ACR_PULL_IDENTITY_NAME: ${{ vars.ACR_PULL_IDENTITY_NAME || 'asset-allocation-acr-pull-mi' }}
      CONTAINER_APPS_ENVIRONMENT_NAME: ${{ vars.CONTAINER_APPS_ENVIRONMENT_NAME || 'asset-allocation-env' }}
      SERVICE_ACCOUNT_NAME: ${{ vars.SERVICE_ACCOUNT_NAME || 'asset-allocation-sa' }}
      UI_APP_NAME: ${{ vars.UI_APP_NAME || 'asset-allocation-ui' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve rollout inputs
        id: inputs
        shell: bash
        run: |
          set -euo pipefail
          image_digest="${{ inputs.image_digest }}"
          api_upstream="${{ inputs.api_upstream }}"
          contracts_version="${{ inputs.contracts_version }}"
          if [ "${GITHUB_EVENT_NAME}" = "repository_dispatch" ]; then
            image_digest="${DISPATCH_IMAGE_DIGEST}"
            api_upstream="${DISPATCH_API_UPSTREAM}"
            contracts_version="${DISPATCH_CONTRACTS_VERSION}"
          fi
          : "${image_digest:?image_digest is required}"
          : "${api_upstream:?api_upstream is required}"
          echo "image_digest=${image_digest}" >> "$GITHUB_OUTPUT"
          echo "api_upstream=${api_upstream}" >> "$GITHUB_OUTPUT"
          echo "contracts_version=${contracts_version}" >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Azure resource identifiers
        id: azure
        shell: bash
        run: |
          set -euo pipefail
          az config set extension.use_dynamic_install=yes_without_prompt > /dev/null
          identity_id="$(az identity show --name "${ACR_PULL_IDENTITY_NAME}" --resource-group "${RESOURCE_GROUP}" --query id -o tsv)"
          acr_login_server="$(az acr show --name "${ACR_NAME}" --resource-group "${RESOURCE_GROUP}" --query loginServer -o tsv)"
          env_id="/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RESOURCE_GROUP}/providers/Microsoft.App/managedEnvironments/${CONTAINER_APPS_ENVIRONMENT_NAME}"
          previous_image="$(az containerapp show --name "${UI_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --query 'properties.template.containers[0].image' -o tsv 2>/dev/null || true)"
          echo "identity_id=${identity_id}" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=${acr_login_server}" >> "$GITHUB_OUTPUT"
          echo "environment_id=${env_id}" >> "$GITHUB_OUTPUT"
          echo "previous_image=${previous_image}" >> "$GITHUB_OUTPUT"

      - name: Render UI manifest
        env:
          UI_IMAGE: ${{ steps.inputs.outputs.image_digest }}
          API_UPSTREAM: ${{ steps.inputs.outputs.api_upstream }}
          ACR_LOGIN_SERVER: ${{ steps.azure.outputs.acr_login_server }}
          ACR_PULL_IDENTITY_RESOURCE_ID: ${{ steps.azure.outputs.identity_id }}
          CONTAINER_APPS_ENVIRONMENT_ID: ${{ steps.azure.outputs.environment_id }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import os

          template = Path("deploy/app_ui.yaml").read_text(encoding="utf-8")
          for key, value in os.environ.items():
              template = template.replace("${" + key + "}", value)
          Path("rendered-app_ui.yaml").write_text(template, encoding="utf-8")
          PY

      - name: Apply UI manifest
        shell: bash
        run: |
          set -euo pipefail
          if az containerapp show --name "${UI_APP_NAME}" --resource-group "${RESOURCE_GROUP}" > /dev/null 2>&1; then
            az containerapp update --name "${UI_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --yaml rendered-app_ui.yaml
          else
            az containerapp create --name "${UI_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --yaml rendered-app_ui.yaml
          fi

      - name: Verify deployed UI endpoints
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          fqdn="$(az containerapp show --name "${UI_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --query 'properties.configuration.ingress.fqdn' -o tsv)"
          actual_image="$(az containerapp show --name "${UI_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --query 'properties.template.containers[0].image' -o tsv)"
          test "${actual_image}" = "${{ steps.inputs.outputs.image_digest }}"
          curl --fail --retry 12 --retry-delay 10 --retry-connrefused "https://${fqdn}/" > /dev/null
          curl --fail --retry 12 --retry-delay 10 --retry-connrefused "https://${fqdn}/config.js" > /dev/null
          echo "fqdn=${fqdn}" >> "$GITHUB_OUTPUT"

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## UI deploy"
            echo ""
            echo "- Target app: \`${UI_APP_NAME}\`"
            echo "- Image: \`${{ steps.inputs.outputs.image_digest }}\`"
            echo "- API upstream: \`${{ steps.inputs.outputs.api_upstream }}\`"
            echo "- Contracts version: \`${{ steps.inputs.outputs.contracts_version || 'not provided' }}\`"
            echo "- FQDN: https://${{ steps.verify.outputs.fqdn }}"
            echo "- Previous image: \`${{ steps.azure.outputs.previous_image || 'none' }}\`"
            echo "- Rollback: rerun this workflow with the previous image digest"
          } >> "${GITHUB_STEP_SUMMARY}"
