name: UI Deploy Prod
run-name: UI Deploy Prod / ${{ github.event_name }} / ${{ github.event.workflow_run.head_branch || github.ref_name }}

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - UI Release
    branches:
      - main
    types:
      - completed

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: ui-prod
  cancel-in-progress: false

jobs:
  resolve-release:
    name: resolve-release
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04
    env:
      API_UPSTREAM: ${{ vars.API_UPSTREAM }}
    outputs:
      image_digest: ${{ steps.manifest.outputs.image_digest }}
    steps:
      - name: Validate dispatch branch and repo deploy vars
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "deploy-prod.yml must be run from main because it redeploys the latest successful main release." >&2
            exit 1
          fi
          : "${API_UPSTREAM:?vars.API_UPSTREAM is required}"

      - name: Resolve release run
        id: release-run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            run_id="${{ github.event.workflow_run.id }}"
          else
            gh api \
              --method GET \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/runs?branch=main&per_page=20" > workflow-runs.json
            run_id="$(python - <<'PY'
            import json
            from pathlib import Path

            runs = json.loads(Path("workflow-runs.json").read_text(encoding="utf-8"))["workflow_runs"]
            for run in runs:
                if run.get("head_branch") == "main" and run.get("conclusion") == "success":
                    print(run["id"])
                    break
            else:
                raise SystemExit("No successful UI Release run on main was found.")
            PY
            )"
          fi
          echo "release_run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Download release manifest
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api \
            --method GET \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${{ steps.release-run.outputs.release_run_id }}/artifacts" > artifacts.json
          artifact_id="$(python - <<'PY'
          import json
          from pathlib import Path

          artifacts = json.loads(Path("artifacts.json").read_text(encoding="utf-8"))["artifacts"]
          for artifact in artifacts:
              if artifact.get("name") == "ui-release" and not artifact.get("expired"):
                  print(artifact["id"])
                  break
          else:
              raise SystemExit("Artifact 'ui-release' was not found on the selected UI Release run.")
          PY
          )"
          gh api \
            --method GET \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > ui-release.zip
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          artifact_dir = Path("release-artifact")
          artifact_dir.mkdir(exist_ok=True)
          with ZipFile("ui-release.zip") as archive:
              archive.extractall(artifact_dir)
          manifest_path = artifact_dir / "release-manifest.json"
          if not manifest_path.exists():
              raise SystemExit("Artifact 'ui-release' did not contain release-manifest.json.")
          PY

      - name: Resolve image digest
        id: manifest
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path("release-artifact/release-manifest.json").read_text(encoding="utf-8"))
          image_digest = manifest.get("image_digest")
          if not image_digest:
              raise SystemExit("release-manifest.json is missing image_digest.")
          if manifest.get("artifact_kind") != "container-image":
              raise SystemExit("release-manifest.json did not describe a container-image artifact.")
          if manifest.get("repo") != os.environ["GITHUB_REPOSITORY"]:
              raise SystemExit("release-manifest.json repo did not match the current repository.")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"image_digest={image_digest}\n")
          PY

  deploy-prod:
    name: deploy-prod
    needs: resolve-release
    uses: ./.github/workflows/deploy-ui-runtime.yml
    with:
      image_digest: ${{ needs.resolve-release.outputs.image_digest }}
    secrets: inherit
