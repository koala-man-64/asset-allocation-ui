name: UI Deploy Prod
run-name: UI Deploy Prod / ${{ github.event_name }} / ${{ github.event.workflow_run.head_branch || github.event.action || github.ref_name }}

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - control_plane_released
  workflow_run:
    workflows:
      - UI Release
    branches:
      - main
    types:
      - completed

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: ui-prod
  cancel-in-progress: false

jobs:
  validate-runtime-repo-vars:
    name: validate-runtime-repo-vars
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' || (github.event_name == 'repository_dispatch' && github.event.action == 'control_plane_released') }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate required repo deploy vars
        env:
          REPO_VARS_JSON: ${{ toJson(vars) }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_github_deploy_vars.py \
            --repo "${GITHUB_REPOSITORY}" \
            --mode prod-runtime \
            --vars-json "${REPO_VARS_JSON}"

  resolve-release:
    name: resolve-release
    needs: validate-runtime-repo-vars
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' || (github.event_name == 'repository_dispatch' && github.event.action == 'control_plane_released') }}
    runs-on: ubuntu-22.04
    env:
      API_UPSTREAM: ${{ vars.API_UPSTREAM }}
    outputs:
      image_digest: ${{ steps.manifest.outputs.image_digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate dispatch branch and repo deploy vars
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "deploy-prod.yml must be run from main because it redeploys the latest successful main release." >&2
            exit 1
          fi
          : "${API_UPSTREAM:?vars.API_UPSTREAM is required}"

      - name: Resolve release image digest
        id: manifest
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          resolver_args=(
            python scripts/workflows/resolve_release_image_digest.py
            --repo "${GITHUB_REPOSITORY}"
            --branch main
            --workflow release.yml
            --artifact ui-release
            --image-repository asset-allocation-ui
            --github-output "$GITHUB_OUTPUT"
          )
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            resolver_args+=(--run-id "${{ github.event.workflow_run.id }}")
          fi
          "${resolver_args[@]}"

  deploy-prod:
    name: deploy-prod
    needs: resolve-release
    uses: ./.github/workflows/deploy-ui-runtime.yml
    with:
      image_digest: ${{ needs.resolve-release.outputs.image_digest }}
    secrets: inherit
