name: UI Deploy Prod
run-name: UI Deploy Prod / ${{ github.event_name }} / ${{ github.event.workflow_run.head_branch || github.ref_name }}

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - UI Release
    branches:
      - main
    types:
      - completed

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: ui-prod
  cancel-in-progress: false

jobs:
  validate-runtime-repo-vars:
    name: validate-runtime-repo-vars
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate required repo deploy vars
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_github_deploy_vars.py --repo "${GITHUB_REPOSITORY}" --mode prod-runtime

  resolve-release:
    name: resolve-release
    needs: validate-runtime-repo-vars
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04
    env:
      API_UPSTREAM: ${{ vars.API_UPSTREAM }}
    outputs:
      image_digest: ${{ steps.manifest.outputs.image_digest }}
    steps:
      - name: Validate dispatch branch and repo deploy vars
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "deploy-prod.yml must be run from main because it redeploys the latest successful main release." >&2
            exit 1
          fi
          : "${API_UPSTREAM:?vars.API_UPSTREAM is required}"

      - name: Resolve release run
        id: release-run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            run_id="${{ github.event.workflow_run.id }}"
          else
            gh api \
              --method GET \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/runs?branch=main&per_page=20" > workflow-runs.json
            run_id="$(jq -r '.workflow_runs[] | select(.head_branch == "main" and .conclusion == "success") | .id' workflow-runs.json | head -n 1)"
            : "${run_id:?No successful UI Release run on main was found.}"
          fi
          echo "release_run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Download release manifest
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api \
            --method GET \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${{ steps.release-run.outputs.release_run_id }}/artifacts" > artifacts.json
          artifact_id="$(jq -r '.artifacts[] | select(.name == "ui-release" and (.expired | not)) | .id' artifacts.json | head -n 1)"
          : "${artifact_id:?Artifact 'ui-release' was not found on the selected UI Release run.}"
          gh api \
            --method GET \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > ui-release.zip
          rm -rf release-artifact
          mkdir -p release-artifact
          unzip -q ui-release.zip -d release-artifact
          test -f release-artifact/release-manifest.json || {
            echo "Artifact 'ui-release' did not contain release-manifest.json." >&2
            exit 1
          }

      - name: Resolve image digest
        id: manifest
        shell: bash
        run: |
          set -euo pipefail
          image_digest="$(jq -r '.image_digest // empty' release-artifact/release-manifest.json)"
          artifact_kind="$(jq -r '.artifact_kind // empty' release-artifact/release-manifest.json)"
          repo="$(jq -r '.repo // empty' release-artifact/release-manifest.json)"
          : "${image_digest:?release-manifest.json is missing image_digest.}"
          test "${artifact_kind}" = "container-image" || {
            echo "release-manifest.json did not describe a container-image artifact." >&2
            exit 1
          }
          test "${repo}" = "${GITHUB_REPOSITORY}" || {
            echo "release-manifest.json repo did not match the current repository." >&2
            exit 1
          }
          echo "image_digest=${image_digest}" >> "$GITHUB_OUTPUT"

  deploy-prod:
    name: deploy-prod
    needs: resolve-release
    uses: ./.github/workflows/deploy-ui-runtime.yml
    with:
      image_digest: ${{ needs.resolve-release.outputs.image_digest }}
    secrets: inherit
