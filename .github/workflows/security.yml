name: UI Security
run-name: UI Security / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout UI repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-ui

      - name: Write required npmrc
        id: npmrc
        env:
          NPMRC_CONTENT: ${{ secrets.NPMRC }}
        shell: bash
        run: |
          set -euo pipefail
          : "${NPMRC_CONTENT:?Set repository secret NPMRC to a complete .npmrc file with read access to @asset-allocation/contracts.}"
          path="${RUNNER_TEMP}/ui.npmrc"
          printf '%s' "${NPMRC_CONTENT}" > "${path}"
          echo "path=${path}" >> "$GITHUB_OUTPUT"

      - name: Audit UI dependencies
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ github.workspace }}/artifacts:/artifacts" \
            -v "${{ steps.npmrc.outputs.path }}:/root/.npmrc:ro" \
            -w /workspace/asset-allocation-ui \
            node:20-bookworm-slim@sha256:6c51af7dc83f4708aaac35991306bca8f478351cfd2bda35750a62d7efcf05bb \
            bash -lc 'set -euo pipefail; corepack enable; pnpm install --frozen-lockfile; pnpm audit --json > /artifacts/pnpm-audit.json || true; pnpm audit --audit-level=high'

      - name: Upload UI audit artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ui-pnpm-audit
          path: artifacts/pnpm-audit.json
          if-no-files-found: error
          retention-days: 14
