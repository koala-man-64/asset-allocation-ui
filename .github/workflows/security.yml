name: UI Security
run-name: UI Security / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-security-${{ github.ref }}
  cancel-in-progress: true

env:
  OSV_SCANNER_VERSION: v2.3.5

jobs:
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout UI repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-ui

      - name: Install OSV-Scanner
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/osv-scanner"
          cd "${RUNNER_TEMP}/osv-scanner"
          curl -fsSLo osv-scanner_linux_amd64 "https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64"
          curl -fsSLo osv-scanner_SHA256SUMS "https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_SHA256SUMS"
          grep 'osv-scanner_linux_amd64$' osv-scanner_SHA256SUMS | sha256sum -c -
          mv osv-scanner_linux_amd64 osv-scanner
          chmod +x osv-scanner

      - name: Audit UI lockfile for high-severity vulnerabilities
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          artifact_path="${GITHUB_WORKSPACE}/artifacts/osv-scan.json"
          temp_artifact_path="${artifact_path}.tmp"
          cd asset-allocation-ui

          scan_exit=0
          "${RUNNER_TEMP}/osv-scanner/osv-scanner" scan -L pnpm-lock.yaml --format json > "${temp_artifact_path}" || scan_exit=$?
          if [ -s "${temp_artifact_path}" ]; then
            mv "${temp_artifact_path}" "${artifact_path}"
          fi

          python3 - "${scan_exit}" "${artifact_path}" <<'PY'
          import json
          import sys
          from pathlib import Path

          scan_exit = int(sys.argv[1])
          artifact_path = Path(sys.argv[2])

          if scan_exit not in (0, 1):
            raise SystemExit(scan_exit)

          if not artifact_path.exists():
            raise SystemExit("OSV scanner did not produce a JSON report.")

          data = json.loads(artifact_path.read_text())
          high_or_critical = []

          for result in data.get("results", []):
            source = result.get("source", {}).get("path", "<unknown>")
            for package in result.get("packages", []):
              package_info = package.get("package", {})
              package_name = package_info.get("name", "<unknown>")
              package_version = package_info.get("version", "<unknown>")

              for group in package.get("groups", []):
                try:
                  score = float(group.get("max_severity") or 0)
                except (TypeError, ValueError):
                  score = 0.0

                if score >= 7.0:
                  high_or_critical.append(
                    {
                      "source": source,
                      "package": f"{package_name}@{package_version}",
                      "score": score,
                      "ids": group.get("ids", []),
                    }
                  )

          if high_or_critical:
            print("High-severity dependency vulnerabilities detected:")
            for finding in high_or_critical:
              advisory_ids = ", ".join(finding["ids"]) or "unknown"
              print(
                f"- {finding['package']} in {finding['source']} "
                f"(max severity {finding['score']:.1f}; ids: {advisory_ids})"
              )
            raise SystemExit(1)

          print("No high-severity dependency vulnerabilities detected by OSV-Scanner.")
          PY

      - name: Upload UI audit artifacts
        if: ${{ always() && hashFiles('artifacts/osv-scan.json') != '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ui-osv-scan
          path: artifacts/osv-scan.json
          if-no-files-found: ignore
          retention-days: 14
