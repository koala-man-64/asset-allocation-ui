location: East US
name: asset-allocation-ui
type: Microsoft.App/containerApps
identity:
  type: UserAssigned
  userAssignedIdentities:
    "${ACR_PULL_IDENTITY_RESOURCE_ID}": {}
properties:
  managedEnvironmentId: ${CONTAINER_APPS_ENVIRONMENT_ID}
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: true
      targetPort: 80
      transport: auto
      allowInsecure: false
    registries:
    - server: ${ACR_LOGIN_SERVER}
      identity: "${ACR_PULL_IDENTITY_RESOURCE_ID}"
  template:
    serviceAccountName: ${SERVICE_ACCOUNT_NAME}
    containers:
    - image: ${UI_IMAGE}
      imageType: ContainerImage
      name: asset-allocation-ui
      env:
      - name: API_UPSTREAM
        value: "${API_UPSTREAM}"
      resources:
        cpu: 0.25
        memory: 0.5Gi
      probes:
      - type: Liveness
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 15
        periodSeconds: 30
        failureThreshold: 3
        timeoutSeconds: 5
      - type: Readiness
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 10
        failureThreshold: 3
        timeoutSeconds: 5
      - type: Startup
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 30
        timeoutSeconds: 5
    scale:
      minReplicas: 1
      maxReplicas: 1
