## Nginx config for the UI container (two-container deployment).
## - Serves the built SPA from /usr/share/nginx/html (copied by ui/Dockerfile).
## - Proxies root-scoped /healthz and /readyz, and /api/* to the FastAPI container
##   (single-origin in the browser).

# Map Upgrade header to a proper Connection value for WebSocket handshakes.
# - If Upgrade is present, send "Connection: upgrade".
# - If not, send "Connection: close".
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  # UI container listens on port 80 (container port mapped by your orchestrator).
  listen 80;

  # Runtime bootstrap and SPA shell are environment-specific and unversioned.
  # Do not let browsers reuse stale auth/API routing config across deployments.
  location = /ui-config.js {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files /ui-config.js =404;
  }

  location = /index.html {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files /index.html =404;
  }

  location = / {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files /index.html =404;
  }

  # Serve the React SPA (built assets) from the container filesystem.
  # - try_files attempts static assets first.
  # - falls back to /index.html to let the client router handle routes.
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  # Expose API health/readiness from the same host in unified app mode.
  location = /healthz {
    proxy_pass ${API_UPSTREAM_SCHEME}://${API_UPSTREAM}/healthz;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_ssl_name $proxy_host;
    proxy_set_header Connection "";
    # Route to the API app, not back into the UI app, when ACA ingress is host-based.
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location = /readyz {
    proxy_pass ${API_UPSTREAM_SCHEME}://${API_UPSTREAM}/readyz;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_ssl_name $proxy_host;
    proxy_set_header Connection "";
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Proxy API calls (and websockets) to FastAPI.
  # - Keep "/api" in the upstream path by omitting a trailing slash on proxy_pass.
  # - Example: /api/system/health -> https://asset-allocation-api.example.com/api/system/health
  location /api/ {
    proxy_pass ${API_UPSTREAM_SCHEME}://${API_UPSTREAM};  # IMPORTANT: no trailing slash
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_ssl_name $proxy_host;

    # Mitigate gateway timeouts when upstream health snapshots are slow.
    proxy_connect_timeout 15s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;
    send_timeout 180s;

    # Preserve the browser origin in X-Forwarded-Host while routing to the API host.
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # WebSocket support for /api/ws/updates.
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

